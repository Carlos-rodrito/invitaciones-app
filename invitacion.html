<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Estilos rápidos para el botón de acompañante */
        .btn-secundario {
            background-color: #f0f0f0;
            color: #333;
            border: 1px dashed #ccc;
            margin-top: 10px;
            font-size: 13px;
        }
        .btn-secundario:hover {
            background-color: #e0e0e0;
        }
    </style>
</head>
<body>

<div class="card">
    
    <div class="carrusel-contenedor" id="carrusel" style="display: none;">
        <button class="btn-carrusel prev" onclick="moverCarrusel(-1)">&#10094;</button>
        <div class="carrusel-imagenes" id="carrusel-imagenes"></div>
        <button class="btn-carrusel next" onclick="moverCarrusel(1)">&#10095;</button>
    </div>

    <h1 id="titulo"></h1>
    <p id="contador"></p>

    <p class="info"><strong>Fecha:</strong> <span id="fecha"></span></p>
    <p class="info"><strong>Lugar:</strong> <span id="lugar"></span></p>

    <hr>

    <div id="area-ingreso">
        <input type="text" id="nombre" placeholder="Tu nombre y apellido">
    </div>
    <h2 id="saludo-vip" style="display: none; color: #4CAF50; font-family: 'Playfair Display', serif;"></h2>

    <div id="contenedor-acompanantes">
        </div>
    
    <button id="btn-add-acompanante" class="btn-secundario" onclick="agregarAcompanante()">+ Añadir acompañante</button>

    <button id="btn-confirmar" onclick="confirmar(event)" style="margin-top: 15px;">Confirmar asistencia</button>
</div>

<script src="js/invitacion.js"></script>
</body>
</html>
