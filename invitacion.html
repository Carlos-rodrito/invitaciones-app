<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación Especial</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="card">
    
    <div class="carrusel-contenedor" id="carrusel" style="display: none;">
        <button class="btn-carrusel prev" onclick="moverCarrusel(-1)">&#10094;</button>
        <div class="carrusel-imagenes" id="carrusel-imagenes"></div>
        <button class="btn-carrusel next" onclick="moverCarrusel(1)">&#10095;</button>
    </div>

    <h1 id="titulo"></h1>
    <p id="contador"></p>

    <p class="info"><strong>Fecha:</strong> <span id="fecha"></span></p>
    <p class="info"><strong>Lugar:</strong> <span id="lugar"></span></p>

    <hr>

    <div id="area-ingreso">
        <input type="text" id="nombre" placeholder="Tu nombre y apellido">
    </div>
    
    <h2 id="saludo-vip" class="saludo-vip" style="display: none;"></h2>

    <div id="contenedor-acompanantes"></div>
    
    <button id="btn-add-acompanante" class="btn-secundario" onclick="agregarAcompanante()">+ Añadir acompañante</button>

    <button id="btn-confirmar" class="btn-principal" onclick="confirmar(event)">Confirmar asistencia</button>
</div>

<script src="js/invitacion.js"></script>
</body>
</html>
