<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Invitación</title>

    <!-- Fuente elegante -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="card">
    <audio id="musica" autoplay loop></audio>
    <img id="imagenEvento" class="img-evento">

    <h1 id="titulo"></h1>
    <p id="contador"></p>

    <video id="videoEvento" controls width="100%"></video>

    <p class="info"><strong>Fecha:</strong> <span id="fecha"></span></p>
    <p class="info"><strong>Lugar:</strong> <span id="lugar"></span></p>

    <hr>

    <input type="text" id="nombre" placeholder="Tu nombre">
    <button onclick="confirmar()">Confirmar asistencia</button>
</div>

<script src="js/invitacion.js"></script>

</body>
</html>
