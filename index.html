<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Invitación</title>
</head>
<body>

<h1>Crear Evento</h1>

<input id="titulo" placeholder="Título del evento">
<input id="fecha" type="date">
<input id="lugar" placeholder="Lugar">

<select id="tipo">
    <option value="boda">Boda</option>
    <option value="quince">15 años</option>
    <option value="cumple">Cumpleaños</option>
    <option value="corporativo">Corporativo</option>
</select>

<input type="file" id="imagen">
<input type="text" id="video" placeholder="URL de video">
<input type="text" id="musica" placeholder="URL de música">
<button onclick="crearEvento()">Crear</button>

<p id="link"></p>

<script src="js/app.js"></script>
</body>
</html>
